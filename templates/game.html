<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess the Link</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="theme-fun">
    <h2>{{ puzzle.category }} puzzle</h2>
    <div class="clues">
      {% for img in puzzle.clues %}
        <div class="clue">
            <img src="{{ url_for('static', filename=img.split('static/')[1]) }}" alt="clue {{ loop.index }}">
        </div>
      {% endfor %}
    </div>

    {% if reveal %}
        <h3>Answer: {{ puzzle.answer }}</h3>
        <ul>
          {% for explanation in puzzle.explanations %}
            <li>{{ explanation }}</li>
          {% endfor %}
        </ul>
        <a href="{{ url_for('game', category=category, idx=idx, reveal=0) }}">Next Puzzle</a>
    {% else %}
        <button onclick="window.location.href='{{ url_for('game', category=category, idx=idx, reveal=1) }}'">
            Reveal Answer
        </button>
    {% endif %}
</body>
</html>
